<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Canvas Soccer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #87ceeb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
      user-select: none;
    }
    #app { position: fixed; inset: 0; }
    #hud {
      position: fixed;
      top: 16px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }
    #score {
      background: rgba(0, 0, 0, 0.55);
      padding: 10px 22px;
      border-radius: 10px;
      font-size: 28px;
      letter-spacing: 2px;
      font-weight: 700;
      text-shadow: 0 2px 4px rgba(0,0,0,0.4);
    }
    #score .you { color: #6ec1ff; }
    #score .cpu { color: #ff7a7a; }
    #legend {
      position: fixed;
      bottom: 16px;
      left: 16px;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      z-index: 10;
      pointer-events: none;
    }
    #legend b { color: #ffd66e; }
    #toast {
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      font-size: 64px;
      font-weight: 900;
      letter-spacing: 6px;
      color: #fff;
      text-shadow: 0 4px 0 #000, 0 6px 30px rgba(0,0,0,0.6);
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
      z-index: 20;
    }
    #toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <div id="app"></div>
  <div id="hud">
    <div id="score">
      <span class="you">YOU</span>
      <span id="scoreYou">0</span>
      &mdash;
      <span id="scoreCpu">0</span>
      <span class="cpu">CPU</span>
    </div>
  </div>
  <div id="legend">
    <div><b>WASD</b> / <b>Arrows</b> — move</div>
    <div><b>Space</b> — kick</div>
    <div><b>Shift</b> — slide tackle</div>
    <div><b>R</b> — reset</div>
  </div>
  <div id="toast"></div>

  <script type="module">
    import * as THREE from 'three';

    // ---------- Constants ----------
    const FIELD_W = 60;          // along X (goal-to-goal)
    const FIELD_D = 40;          // along Z
    const HALF_W = FIELD_W / 2;
    const HALF_D = FIELD_D / 2;
    const GOAL_HALF_WIDTH = 4;   // half-width of goal mouth along Z
    const GOAL_HEIGHT = 3;
    const GOAL_DEPTH = 2.5;
    const BALL_R = 0.5;
    const PLAYER_R = 0.6;
    const KICK_RANGE = 1.6;
    const KICK_POWER = 22;
    const KICK_LIFT = 5;
    const PLAYER_SPEED = 11;
    const CPU_SPEED = 8.5;
    const FRICTION = 1.2;        // velocity damping per second
    const GRAVITY = 22;
    const BOUNCE = 0.45;
    const TACKLE_DURATION = 0.55;
    const TACKLE_SPEED = 17;
    const TACKLE_COOLDOWN = 1.4;
    const TACKLE_HIT_RANGE = PLAYER_R * 2.2;
    const FALL_DURATION = 1.8;   // time spent on the ground after being tackled

    // ---------- Renderer / Scene / Camera ----------
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.getElementById('app').appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 80, 160);

    const camera = new THREE.PerspectiveCamera(
      52, window.innerWidth / window.innerHeight, 0.1, 500
    );
    camera.position.set(0, 32, 44);
    camera.lookAt(0, 0, 0);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ---------- Lights ----------
    scene.add(new THREE.HemisphereLight(0xbfe7ff, 0x3a5a2a, 0.75));
    const sun = new THREE.DirectionalLight(0xffffff, 1.0);
    sun.position.set(20, 40, 25);
    sun.castShadow = true;
    sun.shadow.mapSize.set(1024, 1024);
    sun.shadow.camera.left = -45;
    sun.shadow.camera.right = 45;
    sun.shadow.camera.top = 35;
    sun.shadow.camera.bottom = -35;
    sun.shadow.camera.near = 5;
    sun.shadow.camera.far = 120;
    scene.add(sun);

    // ---------- Helpers ----------
    function flatMat(color, opts = {}) {
      return new THREE.MeshStandardMaterial({
        color, flatShading: true, roughness: 0.85, metalness: 0.0, ...opts,
      });
    }

    function addMesh(geo, mat, parent, opts = {}) {
      const m = new THREE.Mesh(geo, mat);
      m.castShadow = opts.castShadow ?? true;
      m.receiveShadow = opts.receiveShadow ?? false;
      if (opts.pos) m.position.set(...opts.pos);
      if (opts.rot) m.rotation.set(...opts.rot);
      parent.add(m);
      return m;
    }

    // ---------- Pitch ----------
    const pitchGroup = new THREE.Group();
    scene.add(pitchGroup);

    // Grass
    const grassGeo = new THREE.PlaneGeometry(FIELD_W, FIELD_D, 12, 8);
    // jitter vertex heights very slightly for low-poly grass feel
    {
      const pos = grassGeo.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i), y = pos.getY(i);
        const edge = Math.abs(x) > HALF_W - 0.5 || Math.abs(y) > HALF_D - 0.5;
        pos.setZ(i, edge ? 0 : (Math.random() - 0.5) * 0.12);
      }
      grassGeo.computeVertexNormals();
    }
    const grass = new THREE.Mesh(grassGeo, flatMat(0x3fa64a, { roughness: 1 }));
    grass.rotation.x = -Math.PI / 2;
    grass.receiveShadow = true;
    pitchGroup.add(grass);

    // Field stripes (alternating shades) for that mowed look
    const stripeMat = flatMat(0x49b556, { roughness: 1 });
    for (let i = 0; i < 6; i++) {
      const stripe = new THREE.Mesh(
        new THREE.PlaneGeometry(FIELD_W, FIELD_D / 12),
        stripeMat
      );
      stripe.rotation.x = -Math.PI / 2;
      stripe.position.set(0, 0.005, -HALF_D + (i * 2 + 1) * (FIELD_D / 12));
      stripe.receiveShadow = true;
      pitchGroup.add(stripe);
    }

    // Lines
    const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    function addLine(w, d, x, z) {
      const m = new THREE.Mesh(new THREE.PlaneGeometry(w, d), lineMat);
      m.rotation.x = -Math.PI / 2;
      m.position.set(x, 0.02, z);
      pitchGroup.add(m);
      return m;
    }
    const LINE_T = 0.18;
    // Outer rectangle
    addLine(FIELD_W, LINE_T, 0, -HALF_D + LINE_T / 2);
    addLine(FIELD_W, LINE_T, 0,  HALF_D - LINE_T / 2);
    addLine(LINE_T, FIELD_D, -HALF_W + LINE_T / 2, 0);
    addLine(LINE_T, FIELD_D,  HALF_W - LINE_T / 2, 0);
    // Halfway line
    addLine(LINE_T, FIELD_D, 0, 0);
    // Center circle
    {
      const ring = new THREE.Mesh(
        new THREE.RingGeometry(4.5 - LINE_T / 2, 4.5 + LINE_T / 2, 48),
        lineMat
      );
      ring.rotation.x = -Math.PI / 2;
      ring.position.y = 0.02;
      pitchGroup.add(ring);
      const dot = new THREE.Mesh(new THREE.CircleGeometry(0.25, 16), lineMat);
      dot.rotation.x = -Math.PI / 2;
      dot.position.y = 0.02;
      pitchGroup.add(dot);
    }
    // Penalty boxes
    function penaltyBox(side) {
      const boxW = 6, boxD = 14;
      const x = side * (HALF_W - boxW / 2);
      addLine(LINE_T, boxD, x - side * (boxW / 2), 0);
      addLine(boxW, LINE_T, side * (HALF_W - boxW / 2), -boxD / 2);
      addLine(boxW, LINE_T, side * (HALF_W - boxW / 2),  boxD / 2);
    }
    penaltyBox(1);
    penaltyBox(-1);

    // ---------- Goals ----------
    function buildGoal(side, teamColor) {
      const g = new THREE.Group();
      const x = side * HALF_W;
      g.position.x = x;

      const postMat = flatMat(0xf6f6f6, { roughness: 0.6 });
      const postGeo = new THREE.CylinderGeometry(0.12, 0.12, GOAL_HEIGHT, 8);
      const barGeo = new THREE.CylinderGeometry(0.12, 0.12, GOAL_HALF_WIDTH * 2 + 0.24, 8);

      const post1 = new THREE.Mesh(postGeo, postMat);
      post1.position.set(0, GOAL_HEIGHT / 2, -GOAL_HALF_WIDTH);
      post1.castShadow = true;
      g.add(post1);

      const post2 = new THREE.Mesh(postGeo, postMat);
      post2.position.set(0, GOAL_HEIGHT / 2, GOAL_HALF_WIDTH);
      post2.castShadow = true;
      g.add(post2);

      const bar = new THREE.Mesh(barGeo, postMat);
      bar.position.set(0, GOAL_HEIGHT, 0);
      bar.rotation.x = Math.PI / 2;
      bar.castShadow = true;
      g.add(bar);

      // Net: a wireframe box behind the goal mouth
      const netGeo = new THREE.BoxGeometry(GOAL_DEPTH, GOAL_HEIGHT, GOAL_HALF_WIDTH * 2);
      const netFill = new THREE.Mesh(
        netGeo,
        new THREE.MeshStandardMaterial({
          color: teamColor, transparent: true, opacity: 0.12, flatShading: true,
        })
      );
      netFill.position.set(side * GOAL_DEPTH / 2, GOAL_HEIGHT / 2, 0);
      g.add(netFill);

      const netWire = new THREE.LineSegments(
        new THREE.EdgesGeometry(netGeo),
        new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 })
      );
      netWire.position.copy(netFill.position);
      g.add(netWire);

      scene.add(g);
      return g;
    }
    const goalLeft = buildGoal(-1, 0x6ec1ff);  // player's goal (defends left)
    const goalRight = buildGoal(1, 0xff7a7a);  // CPU's goal (player attacks right)

    // ---------- Stands (decorative low-poly boxes) ----------
    {
      const standMat1 = flatMat(0xd95d5d);
      const standMat2 = flatMat(0x4a8edb);
      const standMats = [standMat1, standMat2];
      for (let i = 0; i < 24; i++) {
        const onLong = i < 12;
        const t = (i % 12) / 11;
        const x = onLong ? -HALF_W + t * FIELD_W : (i < 18 ? -HALF_W - 2 : HALF_W + 2);
        const z = onLong ? (i < 6 ? -HALF_D - 2 : HALF_D + 2) : -HALF_D + ((i % 6) / 5) * FIELD_D;
        const h = 1.4 + Math.random() * 1.6;
        const box = new THREE.Mesh(
          new THREE.BoxGeometry(1.6, h, 1.6),
          standMats[i % 2]
        );
        box.position.set(x, h / 2, z);
        box.castShadow = true;
        box.receiveShadow = true;
        scene.add(box);
      }
    }

    // ---------- Soccer ball ----------
    function buildBall() {
      const geo = new THREE.IcosahedronGeometry(BALL_R, 1);
      // Color a subset of faces black for a soccer-ball pattern.
      const posAttr = geo.attributes.position;
      const count = posAttr.count;
      const colors = new Float32Array(count * 3);
      const faceCount = count / 3;
      for (let f = 0; f < faceCount; f++) {
        const black = f % 4 === 0;
        for (let v = 0; v < 3; v++) {
          const idx = (f * 3 + v) * 3;
          if (black) {
            colors[idx] = 0.05; colors[idx + 1] = 0.05; colors[idx + 2] = 0.05;
          } else {
            colors[idx] = 1; colors[idx + 1] = 1; colors[idx + 2] = 1;
          }
        }
      }
      geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      const mat = new THREE.MeshStandardMaterial({
        vertexColors: true, flatShading: true, roughness: 0.55,
      });
      const m = new THREE.Mesh(geo, mat);
      m.castShadow = true;
      return m;
    }
    const ball = buildBall();
    scene.add(ball);

    const ballState = {
      pos: new THREE.Vector3(0, BALL_R, 0),
      vel: new THREE.Vector3(),
    };

    // ---------- Players ----------
    // The rig:
    //   root (bobbable/leanable) → torso, shorts, head, nose, hipL, hipR, shoulderL, shoulderR
    //   hip(L|R) (rotates around X for swing) → upperLeg, knee(L|R)
    //   knee(L|R) (rotates around X for bend) → lowerLeg, foot
    //   shoulder(L|R) → upperArm, elbow(L|R)
    //   elbow(L|R) → lowerArm
    // Joints pivot from the top of each limb, not its midpoint.
    function buildPlayer(bodyColor, shortsColor) {
      const g = new THREE.Group();
      const root = new THREE.Group();
      g.add(root);

      // Torso (hex prism)
      const torso = new THREE.Mesh(
        new THREE.CylinderGeometry(0.42, 0.52, 1.1, 6),
        flatMat(bodyColor)
      );
      torso.position.y = 1.35;
      torso.castShadow = true;
      root.add(torso);

      // Shorts (smaller hex prism)
      const shorts = new THREE.Mesh(
        new THREE.CylinderGeometry(0.5, 0.42, 0.4, 6),
        flatMat(shortsColor)
      );
      shorts.position.y = 0.8;
      shorts.castShadow = true;
      root.add(shorts);

      const legMat = flatMat(0x1f2a3a);
      const skinMat = flatMat(0xf2c79b);
      const upperLegGeo = new THREE.CylinderGeometry(0.17, 0.14, 0.34, 6);
      const lowerLegGeo = new THREE.CylinderGeometry(0.14, 0.12, 0.32, 6);
      const footGeo = new THREE.BoxGeometry(0.22, 0.1, 0.34);

      function buildLeg(side) {
        // hip joint pivot at top of leg
        const hip = new THREE.Group();
        hip.position.set(side * 0.18, 0.62, 0);

        const upper = new THREE.Mesh(upperLegGeo, legMat);
        upper.position.y = -0.17;
        upper.castShadow = true;
        hip.add(upper);

        // knee joint at bottom of upper leg
        const knee = new THREE.Group();
        knee.position.y = -0.34;
        hip.add(knee);

        const lower = new THREE.Mesh(lowerLegGeo, legMat);
        lower.position.y = -0.16;
        lower.castShadow = true;
        knee.add(lower);

        const foot = new THREE.Mesh(footGeo, legMat);
        foot.position.set(0, -0.36, 0.08);
        foot.castShadow = true;
        knee.add(foot);

        return { hip, knee };
      }
      const legL = buildLeg(1);
      const legR = buildLeg(-1);
      root.add(legL.hip, legR.hip);

      const upperArmGeo = new THREE.CylinderGeometry(0.13, 0.12, 0.42, 6);
      const lowerArmGeo = new THREE.CylinderGeometry(0.12, 0.11, 0.40, 6);
      const handGeo = new THREE.IcosahedronGeometry(0.13, 0);

      function buildArm(side) {
        const shoulder = new THREE.Group();
        shoulder.position.set(side * 0.52, 1.78, 0);

        const upper = new THREE.Mesh(upperArmGeo, flatMat(bodyColor));
        upper.position.y = -0.21;
        upper.castShadow = true;
        shoulder.add(upper);

        const elbow = new THREE.Group();
        elbow.position.y = -0.42;
        shoulder.add(elbow);

        const lower = new THREE.Mesh(lowerArmGeo, skinMat);
        lower.position.y = -0.20;
        lower.castShadow = true;
        elbow.add(lower);

        const hand = new THREE.Mesh(handGeo, skinMat);
        hand.position.y = -0.42;
        hand.castShadow = true;
        elbow.add(hand);

        return { shoulder, elbow };
      }
      const armL = buildArm(1);
      const armR = buildArm(-1);
      root.add(armL.shoulder, armR.shoulder);

      // Head
      const head = new THREE.Mesh(
        new THREE.IcosahedronGeometry(0.38, 0),
        skinMat
      );
      head.position.y = 2.25;
      head.castShadow = true;
      root.add(head);

      // Facing indicator (nose) — +Z is forward in local frame
      const nose = new THREE.Mesh(
        new THREE.ConeGeometry(0.08, 0.18, 6),
        flatMat(0xff9966)
      );
      nose.position.set(0, 2.25, 0.34);
      nose.rotation.x = Math.PI / 2;
      root.add(nose);

      g.userData.parts = { root, head, legL, legR, armL, armR };
      g.userData.anim = {
        phase: 0,        // walk cycle phase
        kickTimer: 0,    // seconds remaining in kick animation
        kickLeg: -1,     // which leg kicks next (alternates: -1 = right, 1 = left)
      };
      return g;
    }

    // Drives joint rotations from velocity. kickTriggered = true on the frame
    // a kick is initiated. Forward direction in local frame is +Z, so to swing
    // a limb forward we rotate the joint by NEGATIVE X (right-hand rule).
    const KICK_DURATION = 0.4;
    function setLimbs(parts, hipL, kneeL, hipR, kneeR, shL, shR, elL, elR) {
      parts.legL.hip.rotation.x = hipL;
      parts.legL.knee.rotation.x = kneeL;
      parts.legR.hip.rotation.x = hipR;
      parts.legR.knee.rotation.x = kneeR;
      parts.armL.shoulder.rotation.x = shL;
      parts.armR.shoulder.rotation.x = shR;
      parts.armL.elbow.rotation.x = elL;
      parts.armR.elbow.rotation.x = elR;
    }
    function animateBody(group, vel, dt, kickTriggered, state) {
      const anim = group.userData.anim;
      const parts = group.userData.parts;
      const { root, head, legL, legR, armL, armR } = parts;
      const speedMag = Math.hypot(vel.x, vel.z);

      // ---- Fallen: lying face-down, then a quick get-up at the end ----
      if (state && state.fallTimer > 0) {
        // Easing on the way down (first 0.25s) and on the way back up (last 0.35s).
        const f = state.fallTimer;
        let lying; // 0 standing, 1 fully prone
        if (FALL_DURATION - f < 0.25) {
          lying = (FALL_DURATION - f) / 0.25;
        } else if (f < 0.35) {
          lying = f / 0.35;
        } else {
          lying = 1;
        }
        root.rotation.x = -lying * (Math.PI / 2 - 0.05);
        root.position.y = lying * 0.55; // raise so face plant rests on ground roughly
        head.rotation.x = -root.rotation.x * 0.4;
        setLimbs(parts,
          0.2, 0.1,        // legs splayed slightly
         -0.1, 0.4,
          -1.2, 1.2,       // arms out front (overhead because prone)
          0.6, 0.6);
        armL.shoulder.rotation.z = 0.4;
        armR.shoulder.rotation.z = -0.4;
        return;
      }

      // ---- Tackling: slide pose, body angled forward, lead leg extended ----
      if (state && state.tackleActive > 0) {
        const t = 1 - state.tackleActive / TACKLE_DURATION; // 0 → 1
        const dive = Math.min(1, t * 4); // ramp into pose quickly
        root.rotation.x = -dive * 0.9;
        root.position.y = -dive * 0.25; // sink down to the ground
        head.rotation.x = dive * 0.5;   // tuck chin
        const leadLeg = anim.kickLeg === 1 ? legL : legR;
        const trailLeg = anim.kickLeg === 1 ? legR : legL;
        leadLeg.hip.rotation.x = -1.1;   // extended forward
        leadLeg.knee.rotation.x = 0.1;
        trailLeg.hip.rotation.x = 0.4;   // tucked back
        trailLeg.knee.rotation.x = 1.4;
        armL.shoulder.rotation.x = -0.7;
        armR.shoulder.rotation.x = -0.7;
        armL.shoulder.rotation.z = 0.35;
        armR.shoulder.rotation.z = -0.35;
        armL.elbow.rotation.x = 0.4;
        armR.elbow.rotation.x = 0.4;
        return;
      }

      // Smoothly restore root if we just came out of fall/tackle.
      root.position.y += (0 - root.position.y) * Math.min(1, dt * 8);
      // Reset arm Z drift in case it was overridden.
      armL.shoulder.rotation.z = 0.12;
      armR.shoulder.rotation.z = -0.12;


      // Walk cycle: phase advances faster the faster the player moves.
      const cadence = 2.4; // strides per unit distance
      anim.phase += speedMag * dt * cadence;

      const swingAmt = Math.min(0.85, 0.18 + speedMag * 0.08);
      const s = Math.sin(anim.phase);
      const sOpp = -s; // opposite leg

      // Hips: forward when sin>0 → negative X rotation.
      legL.hip.rotation.x = -s * swingAmt;
      legR.hip.rotation.x = -sOpp * swingAmt;

      // Knees bend during the leg's swing-through (when it's moving forward).
      // Add a small idle bend so legs never look perfectly stiff.
      legL.knee.rotation.x = 0.08 + Math.max(0, s) * swingAmt * 1.3;
      legR.knee.rotation.x = 0.08 + Math.max(0, sOpp) * swingAmt * 1.3;

      // Arms swing opposite to same-side leg.
      armL.shoulder.rotation.x = -sOpp * swingAmt * 0.85;
      armR.shoulder.rotation.x = -s * swingAmt * 0.85;
      // Elbows have a constant slight bend, more when arm is forward.
      armL.elbow.rotation.x = 0.35 + Math.max(0, -sOpp) * 0.35;
      armR.elbow.rotation.x = 0.35 + Math.max(0, -s) * 0.35;
      // Arms also drift slightly out to the sides for natural posture.
      armL.shoulder.rotation.z = 0.12;
      armR.shoulder.rotation.z = -0.12;

      // Torso bob (vertical) and forward lean while moving.
      root.position.y = Math.abs(Math.sin(anim.phase * 2)) * swingAmt * 0.08;
      const targetLean = -Math.min(0.18, speedMag * 0.025);
      root.rotation.x += (targetLean - root.rotation.x) * Math.min(1, dt * 6);

      // Head bobs counter to torso so it stays roughly level.
      head.rotation.x = -root.rotation.x * 0.6;

      // ---- Kick animation: overrides one leg for KICK_DURATION seconds ----
      if (kickTriggered) {
        anim.kickTimer = KICK_DURATION;
        anim.kickLeg *= -1;
      }
      if (anim.kickTimer > 0) {
        const t = 1 - anim.kickTimer / KICK_DURATION; // 0 → 1
        // Three phases: backswing (0..0.25), strike (0.25..0.55), recover (0.55..1)
        let hipAngle, kneeAngle;
        if (t < 0.25) {
          const k = t / 0.25;
          hipAngle = 0.9 * k;          // pull leg back (positive X)
          kneeAngle = 1.0 * k;         // bend knee a lot
        } else if (t < 0.55) {
          const k = (t - 0.25) / 0.30;
          hipAngle = 0.9 - 1.8 * k;    // swing forward through to -0.9
          kneeAngle = 1.0 - 0.95 * k;  // straighten during contact
        } else {
          const k = (t - 0.55) / 0.45;
          hipAngle = -0.9 * (1 - k);   // return to neutral
          kneeAngle = 0.05 + 0.0 * k;
        }
        const kickingLeg = anim.kickLeg === 1 ? legL : legR;
        const standingLeg = anim.kickLeg === 1 ? legR : legL;
        kickingLeg.hip.rotation.x = hipAngle;
        kickingLeg.knee.rotation.x = kneeAngle;
        // Standing leg straightens to balance.
        standingLeg.hip.rotation.x *= 0.3;
        standingLeg.knee.rotation.x = 0.12;
        // Counter-rotate arms for balance during the swing.
        armL.shoulder.rotation.x = -hipAngle * 0.6;
        armR.shoulder.rotation.x = hipAngle * 0.6;

        anim.kickTimer = Math.max(0, anim.kickTimer - dt);
      }
    }

    const player = buildPlayer(0x6ec1ff, 0x1d4f80);
    player.position.set(-10, 0, 0);
    player.rotation.y = Math.PI / 2; // face +X (toward CPU goal)
    scene.add(player);

    const cpu = buildPlayer(0xff7a7a, 0x802020);
    cpu.position.set(10, 0, 0);
    cpu.rotation.y = -Math.PI / 2; // face -X
    scene.add(cpu);

    function makePlayerState() {
      return {
        vel: new THREE.Vector3(),
        kickCooldown: 0,
        tackleActive: 0,    // > 0 = mid-slide
        tackleCooldown: 0,
        tackleDirX: 0,      // locked forward direction at tackle start
        tackleDirZ: 0,
        fallTimer: 0,       // > 0 = currently on the ground
      };
    }
    const playerState = makePlayerState();
    const cpuState = makePlayerState();

    // ---------- Input ----------
    const keys = Object.create(null);
    window.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      if (e.code === 'Space') e.preventDefault();
      if (e.code === 'KeyR') resetPositions(true);
    });
    window.addEventListener('keyup', (e) => { keys[e.code] = false; });

    // ---------- Score ----------
    const score = { you: 0, cpu: 0 };
    let goalLocked = false; // prevents the same goal from counting every frame until reset
    const elScoreYou = document.getElementById('scoreYou');
    const elScoreCpu = document.getElementById('scoreCpu');
    const elToast = document.getElementById('toast');
    let toastTimer = 0;
    function showToast(text, ms = 1200) {
      elToast.textContent = text;
      elToast.classList.add('show');
      toastTimer = ms / 1000;
    }

    function resetPositions(resetScore = false) {
      ballState.pos.set(0, BALL_R, 0);
      ballState.vel.set(0, 0, 0);
      ball.position.copy(ballState.pos);
      ball.rotation.set(0, 0, 0);
      player.position.set(-10, 0, 0);
      player.rotation.y = Math.PI / 2;
      cpu.position.set(10, 0, 0);
      cpu.rotation.y = -Math.PI / 2;
      for (const st of [playerState, cpuState]) {
        st.vel.set(0, 0, 0);
        st.kickCooldown = 0;
        st.tackleActive = 0;
        st.tackleCooldown = 0;
        st.fallTimer = 0;
      }
      for (const p of [player, cpu]) {
        p.userData.parts.root.rotation.set(0, 0, 0);
        p.userData.parts.root.position.y = 0;
      }
      if (resetScore) {
        score.you = score.cpu = 0;
        elScoreYou.textContent = '0';
        elScoreCpu.textContent = '0';
      }
      goalLocked = false;
    }

    // ---------- Update logic ----------
    const tmp = new THREE.Vector3();
    const tmp2 = new THREE.Vector3();
    const forward = new THREE.Vector3();

    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function shortestAngle(a, b) {
      let d = b - a;
      while (d > Math.PI) d -= Math.PI * 2;
      while (d < -Math.PI) d += Math.PI * 2;
      return d;
    }

    function updatePlayer(dt) {
      playerState.kickCooldown = Math.max(0, playerState.kickCooldown - dt);
      playerState.tackleCooldown = Math.max(0, playerState.tackleCooldown - dt);

      // Fallen: ignore input, decay velocity, wait to get up.
      if (playerState.fallTimer > 0) {
        playerState.fallTimer = Math.max(0, playerState.fallTimer - dt);
        playerState.vel.multiplyScalar(Math.exp(-3 * dt));
        player.position.x += playerState.vel.x * dt;
        player.position.z += playerState.vel.z * dt;
        player.position.x = clamp(player.position.x, -HALF_W + PLAYER_R, HALF_W - PLAYER_R);
        player.position.z = clamp(player.position.z, -HALF_D + PLAYER_R, HALF_D - PLAYER_R);
        animateBody(player, playerState.vel, dt, false, playerState);
        pushBall(player.position, playerState.vel, playerState);
        return;
      }

      // Tackling: locked into forward slide.
      if (playerState.tackleActive > 0) {
        playerState.tackleActive = Math.max(0, playerState.tackleActive - dt);
        // Decay tackle speed slightly toward the end.
        const t = playerState.tackleActive / TACKLE_DURATION;
        const speed = TACKLE_SPEED * (0.5 + 0.5 * t);
        playerState.vel.x = playerState.tackleDirX * speed;
        playerState.vel.z = playerState.tackleDirZ * speed;
        player.position.x += playerState.vel.x * dt;
        player.position.z += playerState.vel.z * dt;
        player.position.x = clamp(player.position.x, -HALF_W + PLAYER_R, HALF_W - PLAYER_R);
        player.position.z = clamp(player.position.z, -HALF_D + PLAYER_R, HALF_D - PLAYER_R);
        animateBody(player, playerState.vel, dt, false, playerState);
        pushBall(player.position, playerState.vel, playerState);
        return;
      }

      let ix = 0, iz = 0;
      if (keys['KeyW'] || keys['ArrowUp']) iz -= 1;
      if (keys['KeyS'] || keys['ArrowDown']) iz += 1;
      if (keys['KeyA'] || keys['ArrowLeft']) ix -= 1;
      if (keys['KeyD'] || keys['ArrowRight']) ix += 1;
      const len = Math.hypot(ix, iz);
      if (len > 0) { ix /= len; iz /= len; }

      // Velocity toward input
      const targetVx = ix * PLAYER_SPEED;
      const targetVz = iz * PLAYER_SPEED;
      // simple smoothing
      playerState.vel.x += (targetVx - playerState.vel.x) * Math.min(1, dt * 12);
      playerState.vel.z += (targetVz - playerState.vel.z) * Math.min(1, dt * 12);

      player.position.x += playerState.vel.x * dt;
      player.position.z += playerState.vel.z * dt;
      player.position.x = clamp(player.position.x, -HALF_W + PLAYER_R, HALF_W - PLAYER_R);
      player.position.z = clamp(player.position.z, -HALF_D + PLAYER_R, HALF_D - PLAYER_R);

      // Rotate toward movement direction
      if (len > 0) {
        const targetYaw = Math.atan2(ix, iz); // because +Z = forward
        const cur = player.rotation.y;
        player.rotation.y = cur + shortestAngle(cur, targetYaw) * Math.min(1, dt * 10);
      }

      // Tackle: Shift launches a slide in the current facing direction.
      const shiftDown = keys['ShiftLeft'] || keys['ShiftRight'];
      if (shiftDown && playerState.tackleCooldown === 0) {
        startTackle(player, playerState);
      }

      // Kick
      let kicked = false;
      if (keys['Space'] && playerState.kickCooldown === 0) {
        kicked = tryKick(player, ballState, 1);
        playerState.kickCooldown = 0.4;
      }

      animateBody(player, playerState.vel, dt, kicked, playerState);

      // Body push the ball if collided
      pushBall(player.position, playerState.vel, playerState);
    }

    function updateCpu(dt) {
      cpuState.kickCooldown = Math.max(0, cpuState.kickCooldown - dt);
      cpuState.tackleCooldown = Math.max(0, cpuState.tackleCooldown - dt);

      // Fallen
      if (cpuState.fallTimer > 0) {
        cpuState.fallTimer = Math.max(0, cpuState.fallTimer - dt);
        cpuState.vel.multiplyScalar(Math.exp(-3 * dt));
        cpu.position.x += cpuState.vel.x * dt;
        cpu.position.z += cpuState.vel.z * dt;
        cpu.position.x = clamp(cpu.position.x, -HALF_W + PLAYER_R, HALF_W - PLAYER_R);
        cpu.position.z = clamp(cpu.position.z, -HALF_D + PLAYER_R, HALF_D - PLAYER_R);
        animateBody(cpu, cpuState.vel, dt, false, cpuState);
        pushBall(cpu.position, cpuState.vel, cpuState);
        return;
      }

      // Tackling
      if (cpuState.tackleActive > 0) {
        cpuState.tackleActive = Math.max(0, cpuState.tackleActive - dt);
        const t = cpuState.tackleActive / TACKLE_DURATION;
        const speed = TACKLE_SPEED * (0.5 + 0.5 * t);
        cpuState.vel.x = cpuState.tackleDirX * speed;
        cpuState.vel.z = cpuState.tackleDirZ * speed;
        cpu.position.x += cpuState.vel.x * dt;
        cpu.position.z += cpuState.vel.z * dt;
        cpu.position.x = clamp(cpu.position.x, -HALF_W + PLAYER_R, HALF_W - PLAYER_R);
        cpu.position.z = clamp(cpu.position.z, -HALF_D + PLAYER_R, HALF_D - PLAYER_R);
        animateBody(cpu, cpuState.vel, dt, false, cpuState);
        pushBall(cpu.position, cpuState.vel, cpuState);
        return;
      }

      // Simple AI: move toward ball, kick toward player's goal when close.
      tmp.set(ballState.pos.x - cpu.position.x, 0, ballState.pos.z - cpu.position.z);
      const distToBall = tmp.length();

      // Decide approach point: get behind the ball relative to its target goal (-X side)
      const targetX = -HALF_W; // player's goal
      const dirToGoal = new THREE.Vector3(targetX - ballState.pos.x, 0, 0 - ballState.pos.z);
      dirToGoal.y = 0;
      dirToGoal.normalize();
      // Stand a little behind ball (opposite of goal direction)
      const approach = new THREE.Vector3(
        ballState.pos.x - dirToGoal.x * 1.2,
        0,
        ballState.pos.z - dirToGoal.z * 1.2
      );

      const toApproach = new THREE.Vector3(
        approach.x - cpu.position.x, 0, approach.z - cpu.position.z
      );
      const aDist = toApproach.length();
      if (aDist > 0.01) toApproach.multiplyScalar(1 / aDist);

      // If close to ball, just chase ball directly
      let dirX = toApproach.x, dirZ = toApproach.z;
      if (distToBall < 2.5) {
        dirX = tmp.x / Math.max(0.01, distToBall);
        dirZ = tmp.z / Math.max(0.01, distToBall);
      }

      const targetVx = dirX * CPU_SPEED;
      const targetVz = dirZ * CPU_SPEED;
      cpuState.vel.x += (targetVx - cpuState.vel.x) * Math.min(1, dt * 8);
      cpuState.vel.z += (targetVz - cpuState.vel.z) * Math.min(1, dt * 8);

      cpu.position.x += cpuState.vel.x * dt;
      cpu.position.z += cpuState.vel.z * dt;
      cpu.position.x = clamp(cpu.position.x, -HALF_W + PLAYER_R, HALF_W - PLAYER_R);
      cpu.position.z = clamp(cpu.position.z, -HALF_D + PLAYER_R, HALF_D - PLAYER_R);

      // Face the ball
      const yaw = Math.atan2(tmp.x, tmp.z);
      cpu.rotation.y = cpu.rotation.y + shortestAngle(cpu.rotation.y, yaw) * Math.min(1, dt * 8);

      let kicked = false;
      if (distToBall < KICK_RANGE && cpuState.kickCooldown === 0) {
        // Aim toward player's goal with slight randomness
        const aim = new THREE.Vector3(
          -HALF_W - ballState.pos.x,
          0,
          (Math.random() - 0.5) * (GOAL_HALF_WIDTH * 1.4) - ballState.pos.z
        ).normalize();
        ballState.vel.x = aim.x * KICK_POWER * 0.85;
        ballState.vel.z = aim.z * KICK_POWER * 0.85;
        ballState.vel.y = KICK_LIFT * 0.7;
        cpuState.kickCooldown = 0.7;
        kicked = true;
      }

      // CPU tackle: if the human player is between the CPU and the ball
      // and within range, slide in. Only ~60% of the time so it's not robotic.
      const playerDx = player.position.x - cpu.position.x;
      const playerDz = player.position.z - cpu.position.z;
      const playerDist = Math.hypot(playerDx, playerDz);
      const ballDx = ballState.pos.x - cpu.position.x;
      const ballDz = ballState.pos.z - cpu.position.z;
      const dot = (playerDx * ballDx + playerDz * ballDz) / Math.max(0.01, playerDist * distToBall);
      if (
        playerState.fallTimer === 0 &&
        playerDist > PLAYER_R * 2 &&
        playerDist < 3.5 &&
        distToBall < 4 &&
        dot > 0.5 &&
        cpuState.tackleCooldown === 0 &&
        Math.random() < 0.6
      ) {
        startTackle(cpu, cpuState);
      }

      animateBody(cpu, cpuState.vel, dt, kicked, cpuState);

      pushBall(cpu.position, cpuState.vel, cpuState);
    }

    function startTackle(actor, state) {
      const yaw = actor.rotation.y;
      state.tackleDirX = Math.sin(yaw);
      state.tackleDirZ = Math.cos(yaw);
      state.tackleActive = TACKLE_DURATION;
      state.tackleCooldown = TACKLE_DURATION + TACKLE_COOLDOWN;
      // small forward burst into velocity
      state.vel.x = state.tackleDirX * TACKLE_SPEED;
      state.vel.z = state.tackleDirZ * TACKLE_SPEED;
    }

    // Player-vs-player tackle hit detection. A tackling actor that overlaps
    // the other actor knocks them down (knockback + fallTimer).
    function checkTackleHits() {
      const pairs = [
        [player, playerState, cpu, cpuState],
        [cpu, cpuState, player, playerState],
      ];
      for (const [attacker, atkSt, victim, vicSt] of pairs) {
        if (atkSt.tackleActive <= 0) continue;
        if (vicSt.fallTimer > 0) continue;
        const dx = attacker.position.x - victim.position.x;
        const dz = attacker.position.z - victim.position.z;
        const d = Math.hypot(dx, dz);
        if (d > 0 && d < TACKLE_HIT_RANGE) {
          vicSt.fallTimer = FALL_DURATION;
          // Knockback away from attacker, plus a touch in attacker's forward
          // direction so it looks like the impact pushed them over.
          const nx = -dx / d, nz = -dz / d;
          vicSt.vel.x = nx * 8 + atkSt.tackleDirX * 3;
          vicSt.vel.z = nz * 8 + atkSt.tackleDirZ * 3;
          // Attacker stops short on contact.
          atkSt.vel.x *= 0.3;
          atkSt.vel.z *= 0.3;
        }
      }
    }

    function tryKick(playerObj, ballSt, powerScale) {
      const dx = ballSt.pos.x - playerObj.position.x;
      const dz = ballSt.pos.z - playerObj.position.z;
      const d = Math.hypot(dx, dz);
      if (d > KICK_RANGE) return false;
      // Kick in the direction the player is facing
      const yaw = playerObj.rotation.y;
      // forward vector for a Y-yaw rotation where +Z is forward at yaw=0:
      const fx = Math.sin(yaw);
      const fz = Math.cos(yaw);
      ballSt.vel.x = fx * KICK_POWER * powerScale;
      ballSt.vel.z = fz * KICK_POWER * powerScale;
      ballSt.vel.y = KICK_LIFT;
      return true;
    }

    function pushBall(pos, vel, state) {
      // soft collision between a player and the ball — push the ball away,
      // and impart velocity. Tackling stab gives a much bigger boost.
      const dx = ballState.pos.x - pos.x;
      const dz = ballState.pos.z - pos.z;
      const d = Math.hypot(dx, dz);
      const min = BALL_R + PLAYER_R;
      if (d > 0 && d < min) {
        const nx = dx / d, nz = dz / d;
        const overlap = min - d;
        ballState.pos.x += nx * overlap;
        ballState.pos.z += nz * overlap;
        const playerSpeedAlongN = vel.x * nx + vel.z * nz;
        const tackling = state && state.tackleActive > 0;
        const baseTransfer = Math.max(0, playerSpeedAlongN) * 0.8 + 1.5;
        const transfer = tackling ? baseTransfer + 8 : baseTransfer;
        ballState.vel.x += nx * transfer;
        ballState.vel.z += nz * transfer;
        if (tackling) ballState.vel.y = Math.max(ballState.vel.y, 2.5);
      }
    }

    function updateBall(dt) {
      // gravity
      ballState.vel.y -= GRAVITY * dt;

      // friction on XZ when on ground
      if (ballState.pos.y <= BALL_R + 0.001) {
        const decay = Math.exp(-FRICTION * dt);
        ballState.vel.x *= decay;
        ballState.vel.z *= decay;
      }

      // integrate
      ballState.pos.x += ballState.vel.x * dt;
      ballState.pos.y += ballState.vel.y * dt;
      ballState.pos.z += ballState.vel.z * dt;

      // ground
      if (ballState.pos.y < BALL_R) {
        ballState.pos.y = BALL_R;
        if (ballState.vel.y < 0) ballState.vel.y = -ballState.vel.y * BOUNCE;
        if (Math.abs(ballState.vel.y) < 0.6) ballState.vel.y = 0;
      }

      // Z walls (sidelines)
      if (ballState.pos.z < -HALF_D + BALL_R) {
        ballState.pos.z = -HALF_D + BALL_R;
        ballState.vel.z = Math.abs(ballState.vel.z) * 0.6;
      } else if (ballState.pos.z > HALF_D - BALL_R) {
        ballState.pos.z = HALF_D - BALL_R;
        ballState.vel.z = -Math.abs(ballState.vel.z) * 0.6;
      }

      // X walls / goals
      const inGoalMouth =
        Math.abs(ballState.pos.z) < GOAL_HALF_WIDTH - BALL_R * 0.3 &&
        ballState.pos.y < GOAL_HEIGHT - BALL_R;

      // Right side (CPU goal)
      if (ballState.pos.x > HALF_W - BALL_R) {
        if (!goalLocked && inGoalMouth && ballState.pos.x > HALF_W) {
          onGoal('you');
          return;
        }
        if (!inGoalMouth) {
          ballState.pos.x = HALF_W - BALL_R;
          ballState.vel.x = -Math.abs(ballState.vel.x) * 0.6;
        } else if (ballState.pos.x > HALF_W + GOAL_DEPTH - BALL_R) {
          // back of net
          ballState.pos.x = HALF_W + GOAL_DEPTH - BALL_R;
          ballState.vel.x = -Math.abs(ballState.vel.x) * 0.2;
        }
      }
      // Left side (player goal)
      if (ballState.pos.x < -HALF_W + BALL_R) {
        if (!goalLocked && inGoalMouth && ballState.pos.x < -HALF_W) {
          onGoal('cpu');
          return;
        }
        if (!inGoalMouth) {
          ballState.pos.x = -HALF_W + BALL_R;
          ballState.vel.x = Math.abs(ballState.vel.x) * 0.6;
        } else if (ballState.pos.x < -HALF_W - GOAL_DEPTH + BALL_R) {
          ballState.pos.x = -HALF_W - GOAL_DEPTH + BALL_R;
          ballState.vel.x = Math.abs(ballState.vel.x) * 0.2;
        }
      }

      // Goal posts collision (cylinders at z = ±GOAL_HALF_WIDTH on each side)
      [[-1, -GOAL_HALF_WIDTH], [-1, GOAL_HALF_WIDTH], [1, -GOAL_HALF_WIDTH], [1, GOAL_HALF_WIDTH]]
        .forEach(([sx, sz]) => {
          const px = sx * HALF_W;
          const dx = ballState.pos.x - px;
          const dz = ballState.pos.z - sz;
          const d = Math.hypot(dx, dz);
          const minD = BALL_R + 0.12;
          if (d > 0 && d < minD && ballState.pos.y < GOAL_HEIGHT) {
            const nx = dx / d, nz = dz / d;
            ballState.pos.x += nx * (minD - d);
            ballState.pos.z += nz * (minD - d);
            const vn = ballState.vel.x * nx + ballState.vel.z * nz;
            if (vn < 0) {
              ballState.vel.x -= 1.8 * vn * nx;
              ballState.vel.z -= 1.8 * vn * nz;
            }
          }
        });

      // Apply to mesh
      ball.position.copy(ballState.pos);

      // Rolling rotation
      const speed = Math.hypot(ballState.vel.x, ballState.vel.z);
      if (speed > 0.01) {
        const axis = tmp2.set(-ballState.vel.z, 0, ballState.vel.x).normalize();
        const angle = (speed * dt) / BALL_R;
        ball.rotateOnWorldAxis(axis, angle);
      }
    }

    function onGoal(scorer) {
      if (goalLocked) return;
      goalLocked = true;
      if (scorer === 'you') {
        score.you++;
        elScoreYou.textContent = String(score.you);
        showToast('GOAL!');
      } else {
        score.cpu++;
        elScoreCpu.textContent = String(score.cpu);
        showToast('CPU SCORES');
      }
      // Pause briefly then reset
      setTimeout(() => resetPositions(false), 900);
    }

    // ---------- Loop ----------
    let last = performance.now();
    function frame(now) {
      const dt = Math.min(0.05, (now - last) / 1000);
      last = now;

      updatePlayer(dt);
      updateCpu(dt);
      checkTackleHits();
      updateBall(dt);

      if (toastTimer > 0) {
        toastTimer -= dt;
        if (toastTimer <= 0) elToast.classList.remove('show');
      }

      renderer.render(scene, camera);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
